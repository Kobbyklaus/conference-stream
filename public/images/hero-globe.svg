<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="globe" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="60%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background glow -->
  <ellipse cx="400" cy="300" rx="350" ry="350" fill="url(#glow)"/>
  <!-- Globe -->
  <circle cx="400" cy="300" r="200" fill="url(#globe)" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
  <!-- Grid lines - latitude -->
  <ellipse cx="400" cy="300" rx="200" ry="40" fill="none" stroke="#60a5fa" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="400" cy="300" rx="200" ry="100" fill="none" stroke="#60a5fa" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="400" cy="300" rx="200" ry="160" fill="none" stroke="#60a5fa" stroke-width="0.6" opacity="0.3"/>
  <!-- Grid lines - longitude -->
  <ellipse cx="400" cy="300" rx="40" ry="200" fill="none" stroke="#60a5fa" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="400" cy="300" rx="100" ry="200" fill="none" stroke="#60a5fa" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="400" cy="300" rx="160" ry="200" fill="none" stroke="#60a5fa" stroke-width="0.6" opacity="0.3"/>
  <!-- Continents - simplified shapes -->
  <!-- North America -->
  <path d="M310 210 Q320 195 345 190 Q360 188 370 195 Q375 200 380 210 Q382 225 375 240 Q365 250 350 255 Q335 258 320 252 Q308 242 305 230 Z" fill="#60a5fa" opacity="0.4"/>
  <!-- South America -->
  <path d="M340 310 Q350 295 360 300 Q370 305 375 320 Q378 340 372 360 Q365 380 355 390 Q345 395 338 385 Q330 370 328 350 Q327 330 335 315 Z" fill="#60a5fa" opacity="0.4"/>
  <!-- Europe -->
  <path d="M415 200 Q425 195 440 198 Q450 202 455 212 Q458 222 452 230 Q445 235 435 232 Q425 228 418 218 Q412 210 415 200 Z" fill="#60a5fa" opacity="0.4"/>
  <!-- Africa -->
  <path d="M420 260 Q435 250 450 255 Q460 262 465 280 Q468 300 462 325 Q455 345 445 355 Q435 360 425 350 Q418 335 415 310 Q413 285 418 265 Z" fill="#60a5fa" opacity="0.4"/>
  <!-- Asia -->
  <path d="M460 195 Q480 185 505 190 Q520 195 530 210 Q535 225 528 240 Q520 252 505 258 Q490 260 478 252 Q465 240 458 225 Q454 210 460 195 Z" fill="#60a5fa" opacity="0.4"/>
  <!-- Australia -->
  <path d="M520 340 Q535 335 545 342 Q550 350 548 360 Q542 368 530 365 Q520 360 518 350 Q517 344 520 340 Z" fill="#60a5fa" opacity="0.4"/>
  <!-- Connection dots - pastors around the world -->
  <g filter="url(#softglow)">
    <circle cx="335" cy="230" r="4" fill="#fbbf24"/> <!-- USA -->
    <circle cx="350" cy="350" r="4" fill="#fbbf24"/> <!-- Brazil -->
    <circle cx="435" cy="215" r="4" fill="#fbbf24"/> <!-- Europe -->
    <circle cx="445" cy="300" r="4" fill="#fbbf24"/> <!-- Africa -->
    <circle cx="505" cy="225" r="4" fill="#fbbf24"/> <!-- Asia -->
    <circle cx="535" cy="350" r="4" fill="#fbbf24"/> <!-- Australia -->
    <circle cx="360" cy="310" r="3" fill="#fbbf24"/> <!-- Chile -->
    <circle cx="500" cy="250" r="3" fill="#fbbf24"/> <!-- India -->
    <circle cx="425" cy="280" r="3" fill="#fbbf24"/> <!-- Middle East -->
    <circle cx="320" cy="245" r="3" fill="#fbbf24"/> <!-- Mexico -->
    <circle cx="450" cy="340" r="3" fill="#fbbf24"/> <!-- Kenya -->
    <circle cx="530" cy="300" r="3" fill="#fbbf24"/> <!-- Philippines -->
  </g>
  <!-- Connection lines between dots -->
  <g stroke="#fbbf24" stroke-width="0.5" opacity="0.3">
    <line x1="335" y1="230" x2="435" y2="215"/>
    <line x1="435" y1="215" x2="505" y2="225"/>
    <line x1="505" y1="225" x2="535" y2="350"/>
    <line x1="335" y1="230" x2="350" y2="350"/>
    <line x1="445" y1="300" x2="505" y2="225"/>
    <line x1="350" y1="350" x2="445" y2="300"/>
    <line x1="425" y1="280" x2="500" y2="250"/>
    <line x1="320" y1="245" x2="360" y2="310"/>
    <line x1="450" y1="340" x2="530" y2="300"/>
  </g>
  <!-- Orbiting ring -->
  <ellipse cx="400" cy="300" rx="280" ry="80" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.2" transform="rotate(-20 400 300)"/>
  <!-- Small satellite dots on orbit -->
  <circle cx="180" cy="255" r="2.5" fill="#818cf8" opacity="0.6"/>
  <circle cx="620" cy="345" r="2.5" fill="#818cf8" opacity="0.6"/>
  <circle cx="300" cy="365" r="2" fill="#818cf8" opacity="0.4"/>
  <circle cx="500" cy="235" r="2" fill="#818cf8" opacity="0.4"/>
</svg>