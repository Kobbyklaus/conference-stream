<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="book1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="book2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="book3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="book4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="book5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="shelf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#44403c"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <filter id="bookshadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Shelf -->
  <rect x="80" y="370" width="640" height="16" rx="3" fill="url(#shelf)"/>
  <rect x="80" y="383" width="640" height="6" fill="#1c1917" opacity="0.5"/>
  <!-- Book 1 - Loyalty and Disloyalty -->
  <g filter="url(#bookshadow)">
    <rect x="120" y="130" width="100" height="240" rx="4" fill="url(#book1)"/>
    <rect x="120" y="130" width="12" height="240" rx="2" fill="#5b21b6" opacity="0.6"/>
    <line x1="132" y1="130" x2="132" y2="370" stroke="#6d28d9" stroke-width="0.5"/>
    <text x="170" y="200" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">
      <tspan x="170" dy="0">LOYALTY</tspan>
      <tspan x="170" dy="16">AND</tspan>
      <tspan x="170" dy="16">DISLOYALTY</tspan>
    </text>
    <line x1="145" y1="250" x2="195" y2="250" stroke="#c4b5fd" stroke-width="0.8" opacity="0.5"/>
    <text x="170" y="275" text-anchor="middle" fill="#c4b5fd" font-family="Georgia, serif" font-size="8" opacity="0.8">Dag Heward-Mills</text>
  </g>
  <!-- Book 2 - The Art of Leadership -->
  <g filter="url(#bookshadow)">
    <rect x="235" y="110" width="105" height="260" rx="4" fill="url(#book2)"/>
    <rect x="235" y="110" width="12" height="260" rx="2" fill="#1d4ed8" opacity="0.6"/>
    <line x1="247" y1="110" x2="247" y2="370" stroke="#2563eb" stroke-width="0.5"/>
    <text x="290" y="185" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">
      <tspan x="290" dy="0">THE ART</tspan>
      <tspan x="290" dy="16">OF</tspan>
      <tspan x="290" dy="16">LEADERSHIP</tspan>
    </text>
    <line x1="260" y1="235" x2="318" y2="235" stroke="#93c5fd" stroke-width="0.8" opacity="0.5"/>
    <text x="290" y="260" text-anchor="middle" fill="#93c5fd" font-family="Georgia, serif" font-size="8" opacity="0.8">Dag Heward-Mills</text>
  </g>
  <!-- Book 3 - Church Planting -->
  <g filter="url(#bookshadow)">
    <rect x="355" y="145" width="95" height="225" rx="4" fill="url(#book3)"/>
    <rect x="355" y="145" width="12" height="225" rx="2" fill="#047857" opacity="0.6"/>
    <line x1="367" y1="145" x2="367" y2="370" stroke="#059669" stroke-width="0.5"/>
    <text x="405" y="210" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">
      <tspan x="405" dy="0">CHURCH</tspan>
      <tspan x="405" dy="16">PLANTING</tspan>
    </text>
    <line x1="375" y1="245" x2="433" y2="245" stroke="#6ee7b7" stroke-width="0.8" opacity="0.5"/>
    <text x="405" y="268" text-anchor="middle" fill="#6ee7b7" font-family="Georgia, serif" font-size="8" opacity="0.8">Dag Heward-Mills</text>
  </g>
  <!-- Book 4 - Catch the Anointing -->
  <g filter="url(#bookshadow)">
    <rect x="465" y="120" width="100" height="250" rx="4" fill="url(#book4)"/>
    <rect x="465" y="120" width="12" height="250" rx="2" fill="#b91c1c" opacity="0.6"/>
    <line x1="477" y1="120" x2="477" y2="370" stroke="#dc2626" stroke-width="0.5"/>
    <text x="518" y="195" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">
      <tspan x="518" dy="0">CATCH</tspan>
      <tspan x="518" dy="16">THE</tspan>
      <tspan x="518" dy="16">ANOINTING</tspan>
    </text>
    <line x1="490" y1="245" x2="545" y2="245" stroke="#fca5a5" stroke-width="0.8" opacity="0.5"/>
    <text x="518" y="268" text-anchor="middle" fill="#fca5a5" font-family="Georgia, serif" font-size="8" opacity="0.8">Dag Heward-Mills</text>
  </g>
  <!-- Book 5 - The Mega Church -->
  <g filter="url(#bookshadow)">
    <rect x="580" y="155" width="90" height="215" rx="4" fill="url(#book5)"/>
    <rect x="580" y="155" width="12" height="215" rx="2" fill="#b45309" opacity="0.6"/>
    <line x1="592" y1="155" x2="592" y2="370" stroke="#d97706" stroke-width="0.5"/>
    <text x="628" y="220" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">
      <tspan x="628" dy="0">THE MEGA</tspan>
      <tspan x="628" dy="16">CHURCH</tspan>
    </text>
    <line x1="600" y1="255" x2="655" y2="255" stroke="#fcd34d" stroke-width="0.8" opacity="0.5"/>
    <text x="628" y="278" text-anchor="middle" fill="#fcd34d" font-family="Georgia, serif" font-size="8" opacity="0.8">Dag Heward-Mills</text>
  </g>
  <!-- Decorative elements -->
  <text x="400" y="430" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14">Over 100 titles available in 50+ languages</text>
  <!-- Language flags as small circles -->
  <g opacity="0.6">
    <circle cx="260" cy="460" r="8" fill="#dc2626"/><text x="260" y="464" text-anchor="middle" fill="white" font-size="8">EN</text>
    <circle cx="290" cy="460" r="8" fill="#f59e0b"/><text x="290" y="464" text-anchor="middle" fill="white" font-size="8">ES</text>
    <circle cx="320" cy="460" r="8" fill="#059669"/><text x="320" y="464" text-anchor="middle" fill="white" font-size="8">PT</text>
    <circle cx="350" cy="460" r="8" fill="#2563eb"/><text x="350" y="464" text-anchor="middle" fill="white" font-size="8">FR</text>
    <circle cx="380" cy="460" r="8" fill="#0891b2"/><text x="380" y="464" text-anchor="middle" fill="white" font-size="8">KO</text>
    <circle cx="410" cy="460" r="8" fill="#7c3aed"/><text x="410" y="464" text-anchor="middle" fill="white" font-size="8">DE</text>
    <circle cx="440" cy="460" r="8" fill="#e11d48"/><text x="440" y="464" text-anchor="middle" fill="white" font-size="8">SW</text>
    <circle cx="470" cy="460" r="8" fill="#d97706"/><text x="470" y="464" text-anchor="middle" fill="white" font-size="8">AR</text>
    <circle cx="500" cy="460" r="8" fill="#475569"/><text x="500" y="464" text-anchor="middle" fill="white" font-size="8">+42</text>
  </g>
</svg>